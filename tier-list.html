<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Weapons Tier List | Piratecorewiki</title>
    <style>
        :root {
            --ss-color: #ff0000;
            --s-color: #ffae00;
            --a-color: #d7df00;
            --b-color: #22ff00;
            --c-color: #00d9ff;
            --bg-dark: #050505;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        h1 {
            text-transform: uppercase;
            font-size: 2.5rem;
            margin-bottom: 40px;
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 174, 0, 0.6);
        }

        .tier-container {
            max-width: 1100px;
            margin: 0 auto;
            border: 2px solid #222;
            border-radius: 15px;
            overflow: hidden;
            background: #0a0a0a;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .tier-row {
            display: flex;
            min-height: 120px;
            border-bottom: 2px solid #222;
            transition: 0.3s ease;
        }

        .tier-row:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .tier-label {
            width: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 900;
            color: #000;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        .items-area {
            flex-grow: 1;
            display: flex;
            flex-wrap: wrap;
            padding: 20px;
            gap: 15px;
            align-items: center;
        }

        /* Rank Styles */
        .ss { background: var(--ss-color); box-shadow: inset 0 0 20px #fff; }
        .s  { background: var(--s-color); }
        .a  { background: var(--a-color); }
        .b  { background: var(--b-color); }
        .c  { background: var(--c-color); }

        /* Weapon Card */
        .weapon-card {
            background: #111;
            border: 1px solid #333;
            padding: 12px;
            border-radius: 10px;
            min-width: 100px;
            text-align: center;
            transition: 0.3s;
            position: relative;
        }

        .weapon-card:hover {
            transform: translateY(-5px) scale(1.05);
            border-color: #fff;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        .weapon-icon { font-size: 1.5rem; display: block; margin-bottom: 5px; }
        .weapon-name { font-size: 0.85rem; font-weight: bold; }

        /* Glow Effects */
        .glow-ss { border-color: var(--ss-color); box-shadow: 0 0 10px var(--ss-color); }
        .glow-s  { border-color: var(--s-color); box-shadow: 0 0 10px var(--s-color); }

        .back-home {
            display: inline-block;
            margin-top: 40px;
            padding: 12px 25px;
            background: #ffae00;
            color: black;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        .back-home:hover { background: #fff; transform: scale(1.1); }
    </style>
</head>
<body>

    <h1>Weapon Tier List (All)</h1>

    <div class="tier-container">
        <div class="tier-row">
            <div class="tier-label ss">SS</div>
            <div class="items-area">
                <div class="weapon-card glow-ss">
                    <span class="weapon-icon">⚔️</span>
                    <span class="weapon-name">Ice Queen</span>
                </div>
                <div class="weapon-card glow-ss">
                    <span class="weapon-icon">⚔️</span>
                    <span class="weapon-name">Abyssal Empress</span>
                </div>
            </div>
        </div>

        <div class="tier-row">
            <div class="tier-label s">S</div>
            <div class="items-area">
                <div class="weapon-card glow-s">
                    <span class="weapon-icon">⚔️</span>
                    <span class="weapon-name">Atomic [B10]</span>
                </div>
                <div class="weapon-card glow-s">
                    <span class="weapon-icon">⚔️</span>
                    <span class="weapon-name">King of Heroes</span>
                </div>
                <div class="weapon-card glow-s">
                    <span class="weapon-icon">⚔️</span>
                    <span class="weapon-name">Moon Slayer</span>
                </div>
            </div>
        </div>

        <div class="tier-row">
            <div class="tier-label a">A</div>
            <div class="items-area">
                <div class="weapon-card">
                    <span class="weapon-icon">⚔️</span>
                    <span class="weapon-name">Yamato [B10]</span>
                </div>
                <div class="weapon-card">
                    <span class="weapon-icon">⚔️</span>
                    <span class="weapon-name">Corrupted Excalibur</span>
                </div>
            </div>
        </div>

        <div class="tier-row">
            <div class="tier-label b">B</div>
            <div class="items-area">
                <div class="weapon-card">
                    <span class="weapon-icon">⚔️</span>
                    <span class="weapon-name">Sin of Pride</span>
                </div>
                <div class="weapon-card">
                    <span class="weapon-icon">⚔️</span>
                    <span class="weapon-name">Slime</span>
                </div>
                <div class="weapon-card">
                    <span class="weapon-icon">⚔️</span>
                    <span class="weapon-name">Dragon Slayer</span>
                </div>
            </div>
        </div>

        <div class="tier-row">
            <div class="tier-label c">C</div>
            <div class="items-area">
                <div class="weapon-card">
                    <span class="weapon-icon">⚔️</span>
                    <span class="weapon-name">Gryphon [B3]</span>
                </div>
                <div class="weapon-card">
                    <span class="weapon-icon">⚔️</span>
                    <span class="weapon-name">Soul Reaper</span>
                </div>
                <div class="weapon-card">
                    <span class="weapon-icon">⚔️</span>
                    <span class="weapon-name">Shadow [B10]</span>
                </div>
            </div>
        </div>
    </div>

    <a href="index.html" class="back-home">⬅️ Back to Master Hub</a>

</body>
</html>
